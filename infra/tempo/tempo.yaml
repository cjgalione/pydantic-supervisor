server:
  http_listen_port: 3200
  grpc_server_max_recv_msg_size: 2147483647
  grpc_server_max_send_msg_size: 2147483647

distributor:
  max_attribute_bytes: 104857600
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
          max_recv_msg_size_mib: 1024
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

ingester_client:
  grpc_client_config:
    max_recv_msg_size: 2147483647
    max_send_msg_size: 2147483647

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces

query_frontend:
  search:
    duration_slo: 30s
    throughput_bytes_slo: 1073741824

querier:
  frontend_worker:
    grpc_client_config:
      max_recv_msg_size: 2147483647
      max_send_msg_size: 2147483647

metrics_generator:
  registry:
    external_labels:
      source: pydantic-supervisor-stress

overrides:
  defaults:
    ingestion:
      burst_size_bytes: 20000000
      rate_limit_bytes: 5000000
    global:
      max_bytes_per_trace: 10737418240
