name: Daily modal queries
on:
  schedule:
    - cron: "0 6 * * *"  # daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      num_questions:
        description: "Number of questions to generate for this manual run"
        required: false
        default: "100"
      model_pool:
        description: "Comma-separated model IDs for batch routing (e.g. moonshotai/Kimi-K2.5)"
        required: false
        default: "moonshotai/Kimi-K2.5"
      question_source:
        description: "Question source: generated or bank"
        required: false
        default: "bank"
      per_question_timeout_seconds:
        description: "Timeout per question in seconds"
        required: false
        default: "120"

jobs:
  run-queries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version-file: ".python-version"

      - name: Install dependencies with uv
        run: uv pip install -r requirements.txt --system

      - name: Run queries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: pydantic-supervisor
          BRAINTRUST_ORG_NAME: Braintrust Demos
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # Route Anthropic and OpenAI SDK calls through the Braintrust gateway
          # so all LLM traffic is logged and visible in traces, regardless of
          # which provider PydanticAI resolves a model to. The API keys must be
          # the Braintrust key because the gateway authenticates with it.
          ANTHROPIC_BASE_URL: "https://gateway.braintrust.dev/v1/proxy/anthropic"
          ANTHROPIC_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          OPENAI_BASE_URL: "https://gateway.braintrust.dev/v1/proxy"
          OPENAI_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          NUM_QUESTIONS: ${{ github.event.inputs.num_questions || '100' }}
          CONCURRENCY: 1
          MAX_RETRIES: 3
          BASE_RETRY_SECONDS: 15
          INTER_QUESTION_DELAY_SECONDS: 2
          TRACE_PROFILE: full
          MODEL_POOL: ${{ github.event.inputs.model_pool || 'gemini-2.0-flash-lite' }}
          QUESTION_SOURCE: ${{ github.event.inputs.question_source || 'generated' }}
          PER_QUESTION_TIMEOUT_SECONDS: ${{ github.event.inputs.per_question_timeout_seconds || '120' }}
        run: |
          uv run python scripts/run_queries.py --num-questions "$NUM_QUESTIONS"
